name: Notebook CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install system deps for PDF export
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libatk-bridge2.0-0 \
            libgtk-3-0 \
            libxss1 \
            libasound2t64 \
            libgbm1 \
            libxshmfence1 \
            libglu1-mesa

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "nbconvert[webpdf]>=7.16.6" playwright>=1.48.0

      - name: Install Playwright browser
        run: |
          python -m playwright install chromium

      - name: Execute notebook
        run: |
          jupyter nbconvert \
            --to notebook \
            --execute notebooks/Analyze_AB_Test_Results.ipynb \
            --output Analyze_AB_Test_Results.executed.ipynb \
            --output-dir reports

      - name: Export HTML and PDF
        run: |
          python scripts/export_notebook.py

      - name: Upload reports artifact
        uses: actions/upload-artifact@v4
        with:
          name: ab-test-reports
          path: reports/

      - name: Upload presentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: ab-test-presentation
          path: presentation/Analyze_AB_Test_Results_Presentation.pptx
          if-no-files-found: warn